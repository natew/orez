name = "orez-rust-sync-ingest-harness"
main = "src/ingest-harness-worker.ts"
compatibility_date = "2026-06-01"

[[rules]]
type = "CompiledWasm"
globs = ["orez-sync-cf-host/wasm-module"]
fallthrough = true

[vars]
ADMIN_KEY = "ingest-harness-admin"

[[durable_objects.bindings]]
name = "SYNC_DO"
class_name = "SyncDurableObject"

[[durable_objects.bindings]]
name = "CAPPED_SYNC_DO"
class_name = "CappedSyncDurableObject"

[[durable_objects.bindings]]
name = "UPSTREAM_DO"
class_name = "ZeroDO"

[[services]]
binding = "DATA"
service = "orez-rust-sync-ingest-harness"
entrypoint = "DataService"

[[services]]
binding = "APP"
service = "orez-rust-sync-ingest-harness"
entrypoint = "AppService"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["SyncDurableObject", "ZeroDO"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["CappedSyncDurableObject"]
