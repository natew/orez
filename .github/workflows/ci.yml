name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  actions: read
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.94.0
          targets: wasm32-unknown-unknown

      - uses: ./.github/actions/setup-wasm-pack

      - run: bun install --frozen-lockfile

      - name: build
        run: bun run build

      - name: lint
        run: bun run lint

      - name: format check
        run: bun run format:check

      - name: typecheck
        run: bun run check

      - name: test
        run: bun run test

      - name: wasm sqlite test
        # test excludes this larger lane; run it explicitly so the aggregate
        # evidence gate covers every root TypeScript test file.
        run: bun run test:wasm

      - name: native sqlite guard
        run: bun run test:native:guard

  compiler:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.94.0

      - name: cache cargo + pgsqlite build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            vendor/pgsqlite/build/target
          # cache key derives from ensure.ts so PGSQLITE_PIN bumps invalidate
          key: pgsqlite-${{ runner.os }}-${{ hashFiles('scripts/pgsqlite/ensure.ts') }}
          restore-keys: |
            pgsqlite-${{ runner.os }}-

      - run: bun install --frozen-lockfile

      - name: build pgsqlite (oracle)
        run: bun run compiler:ensure-pgsqlite

      - name: compiler tests (incl. pgsqlite oracle)
        run: bun run test:compiler

  harness:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # root install: the harness imports src/sync-server from the repo root
      - run: bun install --frozen-lockfile

      - name: harness install
        run: cd harness && bun install

      - name: consistency checker self-tests
        run: |
          cd harness
          bun test src/consistency/history.test.ts src/consistency/fault-schedule.test.ts src/consistency/recorder.test.ts src/consistency/artifacts.test.ts src/consistency/atomic-visibility.test.ts src/consistency/atomic-visibility-workload.test.ts src/consistency/exactly-once-lmid.test.ts src/consistency/exactly-once-workload.test.ts src/observed-fetch.test.ts src/consistency/permission-transition.test.ts src/consistency/permission-transition-workload.test.ts src/consistency/permission-artifacts.test.ts

      - name: metamorphic checker self-test
        run: cd harness && bun src/metamorphic.selftest.ts

      - name: shrink and corpus self-test
        run: cd harness && bun src/spec-shrink.selftest.ts

      - name: sync-server smoke (pure sqlite, 20 clients)
        run: cd harness && bun src/smoke.ts --target orez-local --clients 20 --projects 3

      - name: sync-server permission grant and revoke
        # Keep the advertised default lane executable and prove removal from
        # several already-populated client caches across repeated transitions.
        run: cd harness && bun src/permissions.ts

      - name: multi-project sync-server mount
        run: cd harness && bun src/multi-project-mount.ts

      - name: populated-cache permission transition (same-host A/B namespaces)
        # grant/revoke against ALREADY-populated caches across two child
        # namespaces on one host, proven live by a disjoint sentinel barrier
        run: cd harness && bun src/permission-transition-lane.ts

      - name: conformance shapes (stock zero-cache vs sync-server)
        # boots embedded postgres + real zero-cache; the cross-implementation
        # differential is the rewrite's acceptance gate
        run: cd harness && bun src/shapes.ts

      - name: randomized sweep (fresh seed every run)
        # The run ID is both fresh and replayable; the evidence ledger records it.
        run: cd harness && bun src/sweep.ts --rounds 10 --seed ${{ github.run_id }}

      - name: upload sweep regressions
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: sweep-regressions
          path: harness/regressions/
          if-no-files-found: ignore

  native-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.94.0
          targets: wasm32-unknown-unknown

      - uses: ./.github/actions/setup-wasm-pack

      - run: bun install --frozen-lockfile

      - name: build
        run: bun run build

      - name: native integration
        # build the native sqlite binding, then run the full integration suite
        # (native-startup guard + restore/reset/live-stress + embed-integration).
        # these spawn real zero-cache and are the authoritative end-to-end checks;
        # the heavier embed/live-frontend tests live here, not in the unit suite,
        # so a loaded unit-suite run can't starve their in-process change-streamer.
        run: bun run native:bootstrap && bun run test:integration

  sync-browser-host:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.94.0
          targets: wasm32-unknown-unknown

      - uses: ./.github/actions/setup-wasm-pack

      - run: bun install --frozen-lockfile

      - name: install chromium
        run: bun run --cwd packages/sync-browser-host playwright install --with-deps chromium

      - name: browser worker durability and protocol suite
        run: rm -rf packages/sync-cf-host/dist && bun run test:sync-browser-host

  # rust sync engine: workspace build + native crate tests + format gate.
  rust:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      # the sync-core differential test shells out to bun to run the
      # ts-oracle (crates/sync-core/ts-oracle/run-oracle.ts) against the
      # reference spec; it is self-contained (bun:sqlite only, no install).
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.94.0
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      - uses: ./.github/actions/setup-wasm-pack

      - name: cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: rust-${{ runner.os }}-${{ hashFiles('**/Cargo.toml', '**/Cargo.lock') }}
          restore-keys: |
            rust-${{ runner.os }}-

      # the whole workspace must compile (the native host depends on sync-core
      # and sync-wasm building); per-crate fmt gates stay owned by each track.
      - name: build workspace
        run: cargo build --workspace

      - name: sync-native format check
        run: cargo fmt -p sync-native -- --check

      - name: workspace clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      # run every crate's test suite, not just sync-native: sync-core carries
      # the query-compiler + permission regression tests behind the review
      # fixes, and they must be enforced here rather than left unrun.
      - name: workspace tests
        run: cargo test --workspace

      - name: sync-wasm node tests
        run: wasm-pack test --node crates/sync-wasm

  # Checker-boundary self-tests only. These prove the pinned Elle binary accepts
  # and rejects known JSON histories; they do not check an Orez workload.
  elle-cli-self-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: cache pinned Elle release
        uses: actions/cache@v4
        with:
          path: .cache/elle-cli
          key: elle-cli-${{ runner.os }}-${{ hashFiles('scripts/elle/lib.sh', 'scripts/elle/self-test.sh') }}
          restore-keys: |
            elle-cli-${{ runner.os }}-

      - name: official Elle CLI checker self-tests
        env:
          ELLE_CACHE_DIR: ${{ github.workspace }}/.cache/elle-cli
          ELLE_RESULTS_DIR: ${{ github.workspace }}/target/elle-self-test
        run: scripts/elle/self-test.sh

      - name: upload Elle checker self-test evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: elle-cli-self-test-${{ github.run_id }}-${{ github.run_attempt }}
          path: target/elle-self-test/
          if-no-files-found: warn
          retention-days: 14

  # native real-client conformance: build the sync-native release binary and run
  # the rust-local harness lanes against it. shapes/sweep boot embedded postgres +
  # real zero-cache (Node), the same differential the orez-local harness job runs.
  rust-local:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # no explicit node setup: the runner's default node is what the existing
      # `harness` job boots stock-zero under, and zero-sqlite3's native binding
      # is built for that ABI. pinning a different node risks a prebuild ABI
      # mismatch (NODE_MODULE_VERSION), so mirror the harness job's environment.

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.94.0

      - name: cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: rust-${{ runner.os }}-${{ hashFiles('**/Cargo.toml', '**/Cargo.lock') }}
          restore-keys: |
            rust-${{ runner.os }}-

      - name: build sync-native (release)
        run: cargo build --release -p sync-native

      # root install: the harness imports src/sync-server from the repo root
      - run: bun install --frozen-lockfile

      - name: harness install
        run: cd harness && bun install

      - name: rust-local atomic visibility consistency
        run: cd harness && bun src/atomic-visibility-lane.ts --target rust-local --seed ${{ github.run_id }}

      # run the pinned elle-cli list-append analysis on the atomic-visibility
      # history just recorded above (no extra workload run). serializable holds
      # because the workload's none-or-all visibility admits a serial order; a
      # torn read would surface as a G-single/serializability anomaly.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: cache pinned Elle release
        uses: actions/cache@v4
        with:
          path: .cache/elle-cli
          key: elle-cli-${{ runner.os }}-${{ hashFiles('scripts/elle/lib.sh', 'scripts/elle/self-test.sh') }}
          restore-keys: |
            elle-cli-${{ runner.os }}-

      - name: elle list-append on recorded atomic-visibility history
        env:
          ELLE_CACHE_DIR: ${{ github.workspace }}/.cache/elle-cli
        run: scripts/elle/check-history.sh '' harness/target/consistency/elle-report

      - name: rust-local exactly-once LMID consistency
        run: cd harness && bun src/exactly-once-lmid-lane.ts --target rust-local --seed ${{ github.run_id }}

      # capped-diff cut: a one-row diff cap splits a mutation's effect from its
      # lmid ack across two pulls, the system-level net for M4 and O2 (see
      # docs/sync/mutation-matrix.md). sub-second; the release binary is already built.
      - name: rust-local capped-diff cut (M4/O2)
        run: cd harness && bun src/capped-diff-lane.ts --target rust-local

      - name: upload rust-local consistency evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rust-local-consistency-${{ github.run_id }}-${{ github.run_attempt }}
          path: harness/target/consistency/
          if-no-files-found: warn
          retention-days: 14

      - name: rust-local smoke (native host, 20 clients)
        run: cd harness && bun src/smoke.ts --target rust-local --clients 20 --projects 3

      - name: rust-local conformance shapes (stock zero-cache vs native host)
        run: cd harness && bun src/shapes.ts --against rust-local

      - name: rust-local randomized sweep
        run: cd harness && bun src/sweep.ts --against rust-local --rounds 10 --seed ${{ github.run_id }}

      - name: rust-local wake propagation
        run: cd harness && bun src/propagation.ts --against rust-local --baseline none

      - name: rust-local permission grant and revoke
        # Prove per-user isolation plus removal from an already-populated client
        # cache when membership is revoked.
        run: cd harness && bun src/permissions.ts --target rust-local

      - name: rust-local concurrent client storm
        # Exercise one namespace with many live clients and mixed writers, then
        # require every peer and a fresh late client to converge.
        run: cd harness && bun src/storm.ts --target rust-local --clients 50

      - name: rust-local query-aware lifecycle
        # desired-query membership: put/overlap/limit/related/delete/reconnect/
        # permission/lost-response, with forbidden-row raw-store assertions
        run: cd harness && bun src/queries.ts --against rust-local

      - name: rust-local query-aware differential (stock zero-cache)
        # every corpus query's server-side membership must equal stock zero-cache
        run: cd harness && bun src/query-diff.ts

      - name: upload sweep regressions
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: rust-local-sweep-regressions
          path: harness/regressions/
          if-no-files-found: ignore

  # Release-blocking native fault evidence. Keep this separate from the broad
  # rust-local conformance job so the fault matrix runs in parallel and has an
  # independent failure signal/artifact.
  rust-local-faults:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.94.0

      - name: cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: rust-${{ runner.os }}-${{ hashFiles('**/Cargo.toml', '**/Cargo.lock') }}
          restore-keys: |
            rust-${{ runner.os }}-

      - run: bun install --frozen-lockfile

      - name: harness install
        run: cd harness && bun install

      - name: build sync-native (release)
        run: cargo build --release -p sync-native

      - name: pinned upstream corpus ledger
        run: cd harness && bun src/corpus-check.ts

      - name: portable upstream corpus (TypeScript, stock Zero, native Rust)
        run: cd harness && bun src/upstream-corpus.ts --hosts typescript-oracle,stock-zero,sync-native

      - name: rust-local protocol fuzz
        run: cd harness && bun src/protocol-fuzz.ts --target rust-local --cases 500 --seed ${{ github.run_id }} --concurrency 20

      - name: rust-local reconnect and retention recovery
        run: cd harness && bun src/reconnect.ts --target rust-local

      - name: rust-local eviction and process restart
        run: cd harness && bun src/eviction.ts --target rust-local --clients 5

      - name: rust-local transaction and storage faults
        run: cd harness && bun src/storage-faults.ts --target rust-local

      - name: rust-local backup and restore
        run: cd harness && bun src/backup-restore.ts --target rust-local

      - name: rust-local generated lifecycle state machine
        run: |
          cd harness
          bun src/state-machine.ts --against rust-local --seed 1 --steps 18
          bun src/state-machine.ts --against rust-local --nemesis --seed ${{ github.run_id }} --steps 24

      - name: upload native seeds and minimized traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rust-local-fault-regressions
          path: |
            harness/regressions/
            harness/results/
          if-no-files-found: error

  # cloudflare durable-object host: build the wasm engine and run the full
  # sync-cf-host suite. this is where the config cap-validation regression
  # (config.test.mjs) and the workerd platform/integration contracts are
  # enforced; without this job they run only on sol's machine.
  sync-cf-host:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.94.0
          targets: wasm32-unknown-unknown

      - name: cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: rust-${{ runner.os }}-${{ hashFiles('**/Cargo.toml', '**/Cargo.lock') }}
          restore-keys: |
            rust-${{ runner.os }}-

      - uses: ./.github/actions/setup-wasm-pack

      - run: bun install --frozen-lockfile

      - name: sync-cf-host install
        run: cd packages/sync-cf-host && bun install

      # full suite: config cap-validation (bun:test) + workerd platform probe +
      # wasm integration contract. build:wasm runs inside the package scripts.
      - name: sync-cf-host suite
        run: cd packages/sync-cf-host && bun run test

      - name: sync-cf-host push memory soak
        run: |
          cd packages/sync-cf-host
          bunx wrangler dev --config wrangler.toml --local --var ADMIN_KEY:push-memory-admin --port 8999 --log-level error --show-interactive-dev-session false > /tmp/push-memory-worker.log 2>&1 &
          worker_pid=$!
          trap 'kill "$worker_pid"; wait "$worker_pid" || true' EXIT
          for attempt in $(seq 1 150); do
            if curl --fail --silent http://127.0.0.1:8999 > /dev/null; then break; fi
            if [ "$attempt" = 150 ]; then cat /tmp/push-memory-worker.log; exit 1; fi
            sleep 0.1
          done
          cd ../../harness
          bun src/push-memory-soak.ts --target rust-cf --blocks 3 --ops 3000 --writers 12 --worker http://127.0.0.1:8999 --admin-key push-memory-admin

      - name: rust-cf continuous fault and lifecycle gates
        env:
          ZHARNESS_RUST_CF_WORKER: http://127.0.0.1:8998
          ZHARNESS_CF_ADMIN_KEY: rust-cf-fault-admin
        run: |
          cd packages/sync-cf-host
          bunx wrangler dev --config wrangler.toml --local --var ADMIN_KEY:rust-cf-fault-admin --port 8998 --log-level error --show-interactive-dev-session false > /tmp/rust-cf-fault-worker.log 2>&1 &
          worker_pid=$!
          trap 'kill "$worker_pid"; wait "$worker_pid" || true' EXIT
          for attempt in $(seq 1 150); do
            if curl --fail --silent http://127.0.0.1:8998 > /dev/null; then break; fi
            if [ "$attempt" = 150 ]; then cat /tmp/rust-cf-fault-worker.log; exit 1; fi
            sleep 0.1
          done
          cd ../../harness
          bun src/upstream-corpus.ts --hosts typescript-oracle,rust-cf
          bun src/protocol-fuzz.ts --target rust-cf --cases 500 --seed ${{ github.run_id }} --concurrency 20
          bun src/reconnect.ts --target rust-cf
          bun src/eviction.ts --target rust-cf --clients 5
          bun src/storage-faults.ts --target rust-cf
          bun src/backup-restore.ts --target rust-cf
          bun src/state-machine.ts --against rust-cf --seed 1 --steps 18
          bun src/state-machine.ts --against rust-cf --seed ${{ github.run_id }} --steps 24

      - name: upload rust-cf seeds and minimized traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rust-cf-fault-regressions
          path: |
            harness/regressions/
            harness/results/
          if-no-files-found: error

  # This is the exact-identity evidence gate. GitHub does not start it until
  # every required job above is green. The generator independently checks the
  # run event/ref, job conclusions, build SHA, and immutable release-tag SHA
  # before it can write "verified". A main SHA is a verified build; only an
  # exact tag SHA is also a verified release.
  orez-lite-evidence:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    needs:
      - test
      - compiler
      - harness
      - native-integration
      - rust
      - rust-local
      - rust-local-faults
      - sync-cf-host
      - sync-browser-host
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.94.0

      - name: test exact-SHA evidence identity
        run: bun test scripts/generate-orez-lite-evidence.test.ts

      - name: collect qualified fault traces
        uses: actions/download-artifact@v4
        with:
          pattern: '*-fault-regressions'
          path: qualified-traces
          merge-multiple: true

      - name: publish minimized regression trace archive
        id: regression-traces
        uses: actions/upload-artifact@v4
        with:
          name: orez-lite-regression-traces-${{ github.sha }}
          path: qualified-traces/
          if-no-files-found: error
          retention-days: 90

      - name: generate exact-SHA evidence ledger
        env:
          GITHUB_TOKEN: ${{ github.token }}
          OREZ_REGRESSION_TRACES_URL: ${{ steps.regression-traces.outputs.artifact-url }}
          OREZ_REGRESSION_TRACES_PATH: qualified-traces
        run: bun scripts/generate-orez-lite-evidence.ts generate

      - name: validate exact-SHA release gate
        env:
          EXPECTED_EVIDENCE_SHA: ${{ github.sha }}
        run: bun scripts/generate-orez-lite-evidence.ts check

      - name: build static evidence site
        run: |
          cd site
          bun install --frozen-lockfile
          bun run build

      - name: upload immutable evidence ledger
        uses: actions/upload-artifact@v4
        with:
          name: orez-lite-evidence-${{ github.sha }}
          path: site/data/orez-lite-evidence.json
          if-no-files-found: error
          retention-days: 90

      - name: upload static site built from evidence JSON
        uses: actions/upload-artifact@v4
        with:
          name: orez-site-${{ github.sha }}
          path: site/dist/
          if-no-files-found: error
          retention-days: 90

      - name: deploy docs site to Cloudflare
        if: github.ref == 'refs/heads/main'
        working-directory: site
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          # must match the account the CLOUDFLARE_API_TOKEN repo secret is
          # scoped to (currently borrowed from soot per Nate, 2026-07-15)
          CLOUDFLARE_ACCOUNT_ID: aa20b480cc813f2131bc005e2b7fd140
        run: bunx wrangler@4.110.0 deploy --name orez-docs
