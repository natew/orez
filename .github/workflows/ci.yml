name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: build
        run: bun run build

      - name: lint
        run: bun run lint

      - name: format check
        run: bun run format:check

      - name: typecheck
        run: bun run check

      - name: test
        run: bun run test

      - name: native sqlite guard
        run: bun run test:native:guard

  compiler:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable

      - name: cache cargo + pgsqlite build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            vendor/pgsqlite/build/target
          # cache key derives from ensure.ts so PGSQLITE_PIN bumps invalidate
          key: pgsqlite-${{ runner.os }}-${{ hashFiles('scripts/pgsqlite/ensure.ts') }}
          restore-keys: |
            pgsqlite-${{ runner.os }}-

      - run: bun install --frozen-lockfile

      - name: build pgsqlite (oracle)
        run: bun run compiler:ensure-pgsqlite

      - name: compiler tests (incl. pgsqlite oracle)
        run: bun run test:compiler

  harness:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # root install: the harness imports src/sync-server from the repo root
      - run: bun install --frozen-lockfile

      - name: harness install
        run: cd harness && bun install

      - name: sync-server smoke (pure sqlite, 20 clients)
        run: cd harness && bun src/smoke.ts --target orez-local --clients 20 --projects 3

      - name: conformance shapes (stock zero-cache vs sync-server)
        # boots embedded postgres + real zero-cache; the cross-implementation
        # differential is the rewrite's acceptance gate
        run: cd harness && bun src/shapes.ts

      - name: randomized sweep (fresh seed every run)
        run: cd harness && bun src/sweep.ts --rounds 10

      - name: upload sweep regressions
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: sweep-regressions
          path: harness/regressions/
          if-no-files-found: ignore

  native-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: build
        run: bun run build

      - name: native integration
        # build the native sqlite binding, then run the full integration suite
        # (native-startup guard + restore/reset/live-stress + embed-integration).
        # these spawn real zero-cache and are the authoritative end-to-end checks;
        # the heavier embed/live-frontend tests live here, not in the unit suite,
        # so a loaded unit-suite run can't starve their in-process change-streamer.
        run: bun run native:bootstrap && bun run test:integration
