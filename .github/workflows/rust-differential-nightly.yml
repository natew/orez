name: Rust differential nightly

on:
  schedule:
    - cron: "23 10 * * *"
  workflow_dispatch:
    inputs:
      cases:
        description: Proptest cases to generate
        required: false
        default: "512"
        type: string

permissions:
  contents: read

jobs:
  differential:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PROPTEST_CASES: ${{ inputs.cases || '512' }}

    steps:
      - uses: actions/checkout@v4

      # The TypeScript reference oracle uses only Bun's built-in SQLite; no
      # package installation or other runtime is required.
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable

      - name: cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: rust-differential-${{ runner.os }}-${{ hashFiles('**/Cargo.toml', '**/Cargo.lock') }}
          restore-keys: |
            rust-differential-${{ runner.os }}-
            rust-${{ runner.os }}-

      # Runs both the stable 8x200 corpus and the shrinkable generated lane.
      - name: Rust versus TypeScript differential
        run: cargo test -p sync-core --test differential -- --nocapture

      - name: collect minimized regressions and preserved traces
        if: failure()
        shell: bash
        run: |
          mkdir -p rust-differential-results/regressions rust-differential-results/traces
          regression=crates/sync-core/proptest-regressions/differential.txt
          if [[ -f "$regression" ]]; then
            cp "$regression" rust-differential-results/regressions/
          fi
          for trace in /tmp/sync-core-diff-*.json; do
            [[ -e "$trace" ]] || continue
            if [[ "$trace" == *-minimized.json ]]; then
              cp "$trace" rust-differential-results/traces/sync-core-differential-minimized.json
            else
              cp "$trace" rust-differential-results/traces/
            fi
          done

      - name: upload minimized regressions and preserved traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: rust-differential-failure-${{ github.run_id }}-${{ github.run_attempt }}
          path: rust-differential-results/
          if-no-files-found: warn
          retention-days: 14
