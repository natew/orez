name: setup wasm-pack
description: restore the pinned wasm-pack binary or compile it on a cache miss

runs:
  using: composite
  steps:
    - name: restore wasm-pack 0.14.0
      id: cache
      uses: actions/cache@v4
      with:
        path: ~/.cargo/bin/wasm-pack
        key: wasm-pack-${{ runner.os }}-${{ runner.arch }}-0.14.0

    - name: install wasm-pack 0.14.0
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      run: cargo install wasm-pack --version 0.14.0 --locked

    - name: verify wasm-pack 0.14.0
      shell: bash
      run: test "$(wasm-pack --version)" = "wasm-pack 0.14.0"
